<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-left">
            <svg class="logo" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            <h1>Kanban Board</h1>
        </div>
        <button class="btn-add" id="btnAddCard">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Nouvelle carte
        </button>
    </header>

    <main class="board">
        <div class="column" data-status="new">
            <div class="column-header">
                <span class="column-dot dot-new"></span>
                <h2>New</h2>
                <span class="column-count" data-count="new">0</span>
            </div>
            <div class="column-cards" data-status="new"></div>
        </div>

        <div class="column" data-status="validated">
            <div class="column-header">
                <span class="column-dot dot-validated"></span>
                <h2>Validated</h2>
                <span class="column-count" data-count="validated">0</span>
            </div>
            <div class="column-cards" data-status="validated"></div>
        </div>

        <div class="column" data-status="in-progress">
            <div class="column-header">
                <span class="column-dot dot-in-progress"></span>
                <h2>In Progress</h2>
                <span class="column-count" data-count="in-progress">0</span>
            </div>
            <div class="column-cards" data-status="in-progress"></div>
        </div>

        <div class="column" data-status="to-be-tested">
            <div class="column-header">
                <span class="column-dot dot-to-be-tested"></span>
                <h2>To Be Tested</h2>
                <span class="column-count" data-count="to-be-tested">0</span>
            </div>
            <div class="column-cards" data-status="to-be-tested"></div>
        </div>

        <div class="column" data-status="done">
            <div class="column-header">
                <span class="column-dot dot-done"></span>
                <h2>Done</h2>
                <span class="column-count" data-count="done">0</span>
            </div>
            <div class="column-cards" data-status="done"></div>
        </div>
    </main>

    <!-- Modal création / édition -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="cardModal">
            <div class="modal-header">
                <h3 id="modalTitle">Nouvelle carte</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="cardForm">
                <input type="hidden" id="cardId">
                <div class="form-group">
                    <label for="cardTitleInput">Titre *</label>
                    <input type="text" id="cardTitleInput" placeholder="Titre de la tâche" required>
                </div>
                <div class="form-group">
                    <label for="cardDescription">Description</label>
                    <textarea id="cardDescription" rows="3" placeholder="Description de la tâche..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="cardAssignee">Responsable</label>
                        <input type="text" id="cardAssignee" placeholder="Nom du responsable">
                    </div>
                    <div class="form-group">
                        <label for="cardPole">Pôle</label>
                        <select id="cardPole">
                            <option value="dev">Développement</option>
                            <option value="uiux">UI-UX</option>
                            <option value="branding">Branding</option>
                            <option value="marketing">Marketing</option>
                            <option value="audiovisuel">Audiovisuel</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="cardStatus">Statut</label>
                    <select id="cardStatus">
                        <option value="new">New</option>
                        <option value="validated">Validated</option>
                        <option value="in-progress">In Progress</option>
                        <option value="to-be-tested">To Be Tested</option>
                        <option value="done">Done</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="btnCancel">Annuler</button>
                    <button type="button" class="btn-danger" id="btnDelete" style="display:none;">Supprimer</button>
                    <button type="submit" class="btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
